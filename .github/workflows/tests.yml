name: Tests & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── PHP Tests ──────────────────────────────────────────────────────────────
  php:
    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:     ["8.2", "8.3"]
        laravel: ["11.*", "12.*"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions:  dom, curl, libxml, mbstring, zip, pcntl, redis
          coverage:    none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key:  ${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run:  composer update --prefer-dist --no-interaction --with "laravel/framework:${{ matrix.laravel }}"

      - name: Run PHPStan
        run:  vendor/bin/phpstan analyse --no-progress

      - name: Run Pint (code style)
        run:  vendor/bin/pint --test

      - name: Run Pest
        run:  vendor/bin/pest --ci

  # ─── JavaScript Tests ────────────────────────────────────────────────────────
  js:
    name: "Node ${{ matrix.node }} – Vitest"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache:        npm

      - name: Install npm dependencies
        run:  npm ci

      - name: ESLint
        run:  npm run lint || true   # non-blocking until ESLint is configured

      - name: Build package
        run:  npm run build

      - name: Vitest
        run:  npm run test

  # ─── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP security check
        uses: symfonycorp/security-checker-action@v5

      - name: npm audit
        run:  npm audit --audit-level=high || true
